name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Create GitHub App Token
        uses: actions/create-github-app-token@v2
        id: github-app-token
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 3
          token: ${{ steps.github-app-token.outputs.token }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}

      - name: Publish to Maven Central
        run: |
          ./gradlew publishAndReleaseToMavenCentral \
            -Psigning.keyId=${SIGNING_KEY_ID} \
            -Psigning.password=${SIGNING_PASSWORD} \
            -Psigning.secretKeyRingFile=${GITHUB_WORKSPACE}/secring.gpg \
            -PmavenCentralUsername=${MAVEN_CENTRAL_USERNAME} \
            -PmavenCentralPassword=${MAVEN_CENTRAL_PASSWORD}
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.VERSION }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            build/libs/pageindex-kt-${{ steps.version.outputs.VERSION }}.jar
            build/libs/pageindex-kt-${{ steps.version.outputs.VERSION }}-sources.jar
            build/libs/pageindex-kt-${{ steps.version.outputs.VERSION }}-javadoc.jar
